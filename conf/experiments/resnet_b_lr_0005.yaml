# @package _global_

# Modelo B (student destilado) - variante con learning rate más bajo.
# T=4.0, alpha=0.7, lr=0.0005.

defaults:
  - override /model: resnet_distill
  - _self_

data:
  batch_size: 32

model:
  lr: 0.0005
  base_channels: 64
  num_classes: 10
  temperature: 4.0
  alpha: 0.7
  teacher_checkpoint_path: checkpoints/best/resnet_teacher_best.ckpt

logger:
  name: resnet_b_lr_0005

trainer:
  checkpoint:
    dirpath: checkpoints/resnet_b_lr_0005
    export_path: checkpoints/best/resnet_b_lr_0005_best.ckpt
